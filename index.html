<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Generátor surovin – Dračí hlídka</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Generátor hledání surovin</h1>

<form id="generatorForm" class="generator-form">

    <div class="form-main">

        <section class="form-section">
            <label>
                Prostředí
                <select id="environmentSelect" name="environment" required>
                    <!-- naplní JS -->
                </select>
            </label>

            <label>
                Roční období
                <select name="season" required>
                    <option value="jaro">Jaro</option>
                    <option value="léto">Léto</option>
                    <option value="podzim">Podzim</option>
                    <option value="zima">Zima</option>
                </select>
            </label>

            <label class="toggle-switch toggle-inline">
                <input type="checkbox" id="tagsEnabled">
                <span class="toggle-slider"></span>
                <span class="toggle-label">Zvláštní podmínky</span>
            </label>
        </section>

        <section class="form-section">
            <label>
                Score (d10 + Znalost přírody + INT)
                <input type="number" name="score" min="1" required>
            </label>

            <label>
                Počet hodin
                <input type="number" name="hours" min="1" required>
            </label>
        </section>

        <section class="form-section checkboxes">
            <label>
                <input type="checkbox" name="critical">
                Kritický úspěch
            </label>

            <label>
                <input type="checkbox" name="criticalFail">
                Kritický neúspěch
            </label>
        </section>

        <div class="pj-panel">
            <div class="pj-header">
                <span class="pj-title">PJ mode</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="pjEnabled">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div id="pjOptions" hidden>
                <fieldset class="pj-group">
                    <legend>Nálezy za hodinu</legend>
                    <label>
                        Základní min
                        <input type="number" id="pjMinPerHour" value="1" min="0">
                    </label>
                    <label>
                        Základní max
                        <input type="number" id="pjMaxPerHour" value="3" min="1">
                    </label>
                    <p class="pj-hint">Za každých 5 bodů score se rozsah posune o +1</p>
                </fieldset>
            </div>
        </div>

        <section class="tag-section">
            <div id="tagContainer" hidden></div>
        </section>

    </div>

    <button type="submit" class="primary-btn">
        Generovat nález
    </button>

</form>

<section id="result" class="result"></section>

<script src="generator.js"></script>
<script src="main.js"></script>

</body>
</html>
